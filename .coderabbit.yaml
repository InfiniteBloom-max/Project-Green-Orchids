# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: false

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  in_progress_fortune: false
  poem: false
  review_status: true
  path_filters:
    - ".github/**"
    - "scripts/**"
    - "package.json"
    - "start.bat"
  path_instructions:
    - path: ".github/**"
      instructions: |
        Audit CI security, action pinning, permissions, secret handling, caching,
        reproducibility, and whether required application checks are enforced.
    - path: "scripts/**"
      instructions: |
        Audit destructive-operation safeguards, database and environment handling,
        idempotency, error propagation, portability, and accidental secret exposure.
  auto_review:
    enabled: true
    drafts: true
    auto_incremental_review: true

chat:
  art: false
